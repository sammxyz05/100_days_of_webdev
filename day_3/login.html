<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMC - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-body">

    <div class="auth-card">
        <a href="index.html" class="back-home">&larr; Back to Shop</a>
        <div class="logo auth-logo">
            <i class="fa-solid fa-fire-flame-curved"></i> Stride<span>DMC</span>
        </div>
        <h2>Welcome Back, Hunter</h2>
        <p class="auth-subtitle">Log in to check your SSS Rank gear orders.</p>

        <form class="auth-form">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="dante@devilnevercry.com" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="auth-options">
                <label class="remember-me">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot-pass">Forgot Password?</a>
            </div>
            <button type="submit" class="btn-primary auth-submit">Release Devil Trigger (Login)</button>
        </form>

        <p class="auth-switch">New to the agency? <a href="signup.html">Create an account</a></p>
    </div>

</body>

</html>
